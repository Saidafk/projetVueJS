name: CI/CD CinéList

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout du code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: vue-project/package-lock.json

      - name: 📦 Installation des dépendances
        run: npm install
        working-directory: ./vue-project

      - name: 🏗️ Build de l'application
        run: npm run build
        working-directory: ./vue-project

      - name: 🚀 Déploiement vers le VPS via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # On s'assure de bien pointer vers le contenu du build
          source: "vue-project/dist/*"
          target: "/var/www/cinelist"
          strip_components: 2
          rm: true