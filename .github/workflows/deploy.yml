name: CI/CD CinéList

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout du code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 📦 Installation des dépendances
        run: npm install --legacy-peer-deps

      - name: 🏗️ Build de l'application
        run: npm run build

      - name: 🧹 Nettoyage préalable du VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # On vide le dossier sans sudo car 'deploy' est propriétaire
            rm -rf /var/www/cinelist/*

      - name: 🚀 Déploiement vers le VPS via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/var/www/cinelist/"
          strip_components: 1

      - name: 🔒 Ajustement final des droits
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # On s'assure que les nouveaux fichiers sont bien lisibles
            chmod -R 755 /var/www/cinelist