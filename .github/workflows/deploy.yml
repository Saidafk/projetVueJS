name: CI/CD CinéList

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout du code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: vue-project/package-lock.json

      - name: 📦 Installation des dépendances
        working-directory: ./vue-project
        run: npm install

      - name: 🏗️ Build de l'application
        working-directory: ./vue-project
        run: npm run build

      - name: 🧹 Nettoyage et Droits sur le VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo chown -R ${{ secrets.SSH_USER }}:${{ secrets.SSH_USER }} /var/www/cinelist
            sudo chmod -R 755 /var/www/cinelist
            # On vide le dossier ici, AVANT le scp-action
            rm -rf /var/www/cinelist/*

      - name: 📤 Déploiement via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "vue-project/dist/*"
          target: "/var/www/cinelist/"
          strip_components: 2  # supprime "vue-project/dist" du chemin

      - name: 🔄 Rechargement Nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo systemctl reload nginx