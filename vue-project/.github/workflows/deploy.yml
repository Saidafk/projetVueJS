name: CI/CD CinéList

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout du code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Installation des dépendances
        run: npm install

      - name: 🏗️ Build de l'application
        run: npm run build

      - name: 🚀 Déploiement vers le VPS via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/var/www/cinelist/"
          strip_components: 1

      - name: 🧹 Nettoyage et Droits sur le VPS
        uses: appleboy/ssh-action@master
        with:
          host: 31.207.33.201
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo chown -R www-data:www-data /var/www/cinelist
            sudo chmod -R 755 /var/www/cinelist
            sudo systemctl reload nginx